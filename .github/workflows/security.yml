name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  org-guard:
    name: Verify Repository Organization
    runs-on: ubuntu-latest
    steps:
      - name: Ensure repo is under rayketcham-lab
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          if [ "$REPO_OWNER" != "rayketcham-lab" ]; then
            echo "::error::Repository must be under 'rayketcham-lab' organization, not '$REPO_OWNER'"
            exit 1
          fi
          echo "Repo is correctly under rayketcham-lab"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: windows-latest
    needs: org-guard
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Parcl.sln

      - name: Check for vulnerable packages
        run: |
          $output = dotnet list Parcl.sln package --vulnerable --include-transitive
          Write-Output $output
          if ($output -match "has the following vulnerable packages") {
            Write-Error "Vulnerable packages detected"
            exit 1
          }
          Write-Output "No vulnerable packages found"
        shell: pwsh

      - name: Check for deprecated packages
        run: dotnet list Parcl.sln package --deprecated
        continue-on-error: true

  code-analysis:
    name: Build & Code Analysis
    runs-on: windows-latest
    needs: org-guard
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Parcl.sln

      - name: Build solution
        run: dotnet build Parcl.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/Parcl.Core.Tests/Parcl.Core.Tests.csproj --configuration Release --no-restore --verbosity normal --filter "FullyQualifiedName!~RealCertE2E&FullyQualifiedName!~FindByEmail_ReturnsLatestValid&FullyQualifiedName!~Get_Expired_ReturnsNull"

      - name: Check formatting
        run: dotnet format Parcl.sln --verify-no-changes
        continue-on-error: true

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    needs: org-guard
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in source
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0

          # Check for common secret patterns in tracked files
          for pattern in \
            "password\s*=\s*[\"'][^\"']+[\"']" \
            "api[_-]?key\s*=\s*[\"'][^\"']+[\"']" \
            "secret\s*=\s*[\"'][^\"']+[\"']" \
            "private[_-]?key" \
            "BEGIN RSA PRIVATE KEY" \
            "BEGIN EC PRIVATE KEY" \
            "BEGIN PRIVATE KEY" \
            "AKIA[0-9A-Z]{16}" \
            "ghp_[a-zA-Z0-9]{36}" \
            "-----BEGIN CERTIFICATE-----" \
          ; do
            MATCHES=$(git grep -l -i -E "$pattern" -- '*.cs' '*.json' '*.yml' '*.yaml' '*.xml' '*.config' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              # Filter out false positives (test files, config templates, cert exchange code)
              REAL=$(echo "$MATCHES" | grep -v -E "(Test|test|\.example|CredentialProtector|CertExchange|MimeBuilder)" || true)
              if [ -n "$REAL" ]; then
                echo "::warning::Potential secret pattern '$pattern' found in: $REAL"
                FOUND=$((FOUND + 1))
              fi
            fi
          done

          if [ "$FOUND" -gt 0 ]; then
            echo "::warning::$FOUND potential secret pattern(s) found — review above"
          else
            echo "No secrets detected"
          fi
        shell: bash
