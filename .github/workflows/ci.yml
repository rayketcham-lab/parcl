name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  org-guard:
    name: Verify Repository Organization
    runs-on: ubuntu-latest
    steps:
      - name: Ensure repo is under rayketcham-lab
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          if [ "$REPO_OWNER" != "rayketcham-lab" ]; then
            echo "::error::Repository must be under 'rayketcham-lab' organization, not '$REPO_OWNER'"
            echo "This repo appears to be forked or mirrored to the wrong org."
            exit 1
          fi
          echo "Repo is correctly under rayketcham-lab"

  build:
    name: Build Solution
    runs-on: windows-latest
    needs: org-guard
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Parcl.sln

      - name: Build solution
        run: dotnet build Parcl.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/Parcl.Core.Tests/Parcl.Core.Tests.csproj --configuration Release --no-restore --verbosity normal --filter "FullyQualifiedName!~RealCertE2E&FullyQualifiedName!~FindByEmail_ReturnsLatestValid&FullyQualifiedName!~Get_Expired_ReturnsNull"

      - name: Verify strong name — Parcl.Core
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\x64\sn.exe" -vf src\Parcl.Core\bin\Release\net48\Parcl.Core.dll
        shell: pwsh

      - name: Verify strong name — Parcl.Addin
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools\x64\sn.exe" -vf src\Parcl.Addin\bin\Release\net48\Parcl.Addin.dll
        shell: pwsh

      - name: Verify assembly metadata
        run: |
          $core = [System.Reflection.AssemblyName]::GetAssemblyName("src\Parcl.Core\bin\Release\net48\Parcl.Core.dll")
          $addin = [System.Reflection.AssemblyName]::GetAssemblyName("src\Parcl.Addin\bin\Release\net48\Parcl.Addin.dll")
          $coreToken = [BitConverter]::ToString($core.GetPublicKeyToken()) -replace '-',''
          $addinToken = [BitConverter]::ToString($addin.GetPublicKeyToken()) -replace '-',''
          Write-Host "Parcl.Core: $($core.FullName)"
          Write-Host "Parcl.Addin: $($addin.FullName)"
          if ($coreToken.Length -eq 0) { Write-Error "Parcl.Core is NOT strong-named"; exit 1 }
          if ($addinToken.Length -eq 0) { Write-Error "Parcl.Addin is NOT strong-named"; exit 1 }
          if ($coreToken -ne $addinToken) { Write-Error "PublicKeyToken mismatch: Core=$coreToken Addin=$addinToken"; exit 1 }
          Write-Host "Strong name verified: PublicKeyToken=$coreToken"
        shell: pwsh

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: Parcl-Installer
          path: src/Parcl.Installer/bin/Release/Parcl.Installer.msi

  lint:
    name: Code Quality
    runs-on: windows-latest
    needs: org-guard
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format

      - name: Check formatting
        run: dotnet format Parcl.sln --verify-no-changes --verbosity diagnostic
        continue-on-error: true
